name: Update YouTube Shorts

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      MAX_NEW_SHORTS_PER_REGION: "8"
      YT_SEARCH_LIMIT: "12"
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      YT: ${{ secrets.YT }}
      YOUTUBE_API_SEARCH_LIMIT: "5"
      MIN_DISPLAY_VIEWS: "3000"
      VIRAL_VIEW_THRESHOLD: "100000000"
      PUBLISHED_METADATA_LIMIT: "200"
      TZ: Asia/Seoul
    concurrency:
      group: update-youtube-shorts
      cancel-in-progress: true
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Collect and render Shorts
        run: python scripts/update_shorts.py

      - name: Validate generated files
        run: |
          python -m json.tool shorts-data.json >/dev/null
          python - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          import json
          import re
          from datetime import datetime, timezone

          class CardCounter(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.cards = 0
                  self.images = 0
                  self.short_links = []
                  self.thumb_links = []
                  self.tabs = 0
                  self.panels = 0
                  self.popularity = 0
                  self.popularity_text = []
                  self.reason_items = 0
                  self.stats_rows = 0
                  self._in_popularity = False
                  self._in_short_card = False

              def handle_starttag(self, tag, attrs):
                  attrs = dict(attrs)
                  classes = attrs.get("class", "")
                  href = attrs.get("href", "")
                  if tag == "article" and "short-card" in classes:
                      self.cards += 1
                      self._in_short_card = True
                  if tag == "img" and self._in_short_card:
                      self.images += 1
                  if tag == "a" and href.startswith("https://www.youtube.com/shorts/"):
                      self.short_links.append(href)
                      if "thumb-link" in classes:
                          self.thumb_links.append(href)
                  if tag == "button" and attrs.get("data-region-tab"):
                      self.tabs += 1
                  if tag == "section" and attrs.get("data-region-panel"):
                      self.panels += 1
                  if tag == "div" and "stats-row" in classes:
                      self.stats_rows += 1
                  if tag in {"div", "p"} and "popularity" in classes:
                      self.popularity += 1
                      self.popularity_text.append("")
                      self._in_popularity = True
                  if tag == "li" and self._in_popularity:
                      self.reason_items += 1

              def handle_data(self, data):
                  if self._in_popularity:
                      self.popularity_text[-1] += data

              def handle_endtag(self, tag):
                  if tag in {"div", "p"} and self._in_popularity:
                      self._in_popularity = False
                  if tag == "article" and self._in_short_card:
                      self._in_short_card = False

          parser = CardCounter()
          html = Path("index.html").read_text(encoding="utf-8")
          parser.feed(html)
          video_ids = [url.rstrip("/").split("/")[-1] for url in parser.thumb_links]
          data = json.loads(Path("shorts-data.json").read_text(encoding="utf-8"))
          by_id = {item["id"]: item for item in data}
          visible = [by_id[video_id] for video_id in video_ids]
          def content_signature(item):
              title = re.sub(r"\W+", " ", str(item.get("title") or "").lower()).strip()
              return title if len(title) >= 12 else str(item.get("id") or "")
          def parse_collected_at(item):
              value = item.get("collectedAt")
              if not value:
                  return datetime(1970, 1, 1, tzinfo=timezone.utc)
              parsed = datetime.fromisoformat(str(value).replace("Z", "+00:00"))
              if parsed.tzinfo is None:
                  parsed = parsed.replace(tzinfo=timezone.utc)
              return parsed.astimezone(timezone.utc)
          collected_order = [parse_collected_at(item) for item in data]
          data_signatures = [content_signature(item) for item in data]
          visible_signatures = [content_signature(item) for item in visible]
          explained_popularity = [
              text for text in parser.popularity_text
              if len(text) >= 100 and "views" in text
          ]
          if (
              parser.tabs != 19
              or parser.panels != 19
              or parser.cards == 0
              or parser.cards != parser.images
              or parser.cards != len(parser.thumb_links)
              or parser.cards != parser.stats_rows
              or parser.cards != parser.popularity
              or parser.cards != len(explained_popularity)
              or parser.reason_items < parser.cards * 4
              or len(video_ids) != len(set(video_ids))
              or len(data_signatures) != len(set(data_signatures))
              or len(visible_signatures) != len(set(visible_signatures))
              or "trend-brief" not in html
              or "mega-panel" not in html
              or "popularity" not in html
              or "stats-row" not in html
              or "좋아요" not in html
              or any(
                  collected_order[index] < collected_order[index + 1]
                  for index in range(len(collected_order) - 1)
              )
              or any((item.get("viewsGained") or 0) < 3000 for item in visible)
              or any(not item.get("publishedAt") for item in visible)
              or any(item.get("isShort9x16") is not True for item in data)
              or any((item.get("duration") or 9999) > 180 for item in data)
              or any((item.get("height") or 0) <= (item.get("width") or 0) for item in data)
          ):
              raise SystemExit("index.html did not render unique Shorts across the expected region tabs")
          print({
              "tabs": parser.tabs,
              "panels": parser.panels,
              "cards": parser.cards,
              "images": parser.images,
              "thumb_links": len(parser.thumb_links),
              "stats_rows": parser.stats_rows,
              "popularity": parser.popularity,
              "explained_popularity": len(explained_popularity),
              "reason_items": parser.reason_items,
              "all_short_links": len(parser.short_links),
              "unique_short_ids": len(set(video_ids)),
              "newest_data_first": True,
          })
          PY

      - name: Commit updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update trending shorts"
          file_pattern: "index.html shorts-data.json"
